version: '3.9'

x-nest-defaults: &nest-defaults
  build:
    context: .
  networks:
    - recruitment-network
  depends_on:
    rabbitmq:
      condition: service_healthy
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '3'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: recruitment-rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - recruitment-network

  gateway-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/gateway-service/Dockerfile
    image: recruitment/gateway-service:latest
    container_name: gateway-service
    environment:
      PORT: 3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - '3000:3000'

  candidate-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/candidate-service/Dockerfile
    image: recruitment/candidate-service:latest
    container_name: candidate-service
    environment:
      PORT: 3001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - '3001:3001'

  parsing-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/parsing-service/Dockerfile
    image: recruitment/parsing-service:latest
    container_name: parsing-service
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3002/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - '3002:3002'

  verification-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/verification-service/Dockerfile
    image: recruitment/verification-service:latest
    container_name: verification-service
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3003/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - '3003:3003'

  qualification-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/qualification-service/Dockerfile
    image: recruitment/qualification-service:latest
    container_name: qualification-service
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3004/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - '3004:3004'

  notification-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    image: recruitment/notification-service:latest
    container_name: notification-service
    environment:
      PORT: 3005
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
