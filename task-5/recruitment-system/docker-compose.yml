version: '3.9'

# RabbitMQ — wspólna infrastruktura (bez profilu: `docker compose up rabbitmq`).
# Każdy mikroserwis ma własny profil — uruchom tylko wybrany:
#   docker compose --profile gateway up -d
#   docker compose --profile candidate up -d
# Wszystkie serwisy + RabbitMQ:
#   docker compose --profile all up -d
#
# Wymagany plik .env (np. skopiuj z .env.example) z URL-ami RDS / ElastiCache.

x-service-base: &service-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped
  networks:
    - recruitment

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: recruitment-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    networks:
      - recruitment

  gateway-service:
    <<: *service-base
    container_name: recruitment-gateway
    profiles: [gateway, all]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway-service
    ports:
      - '3000:3000'
    environment:
      port: '3000'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  candidate-service:
    <<: *service-base
    container_name: recruitment-candidate
    profiles: [candidate, all]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: candidate-service
    ports:
      - '3001:3001'
    environment:
      port: '3001'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  parsing-service:
    <<: *service-base
    container_name: recruitment-parsing
    profiles: [parsing, all]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: parsing-service
    ports:
      - '3002:3002'
    environment:
      port: '3002'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  verification-service:
    <<: *service-base
    container_name: recruitment-verification
    profiles: [verification, all]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: verification-service
    ports:
      - '3003:3003'
    environment:
      port: '3003'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  qualification-service:
    <<: *service-base
    container_name: recruitment-qualification
    profiles: [qualification, all]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: qualification-service
    ports:
      - '3004:3004'
    environment:
      port: '3004'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  notification-service:
    <<: *service-base
    container_name: recruitment-notification
    profiles: [notification, all]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    ports:
      - '3005:3005'
    environment:
      port: '3005'
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

networks:
  recruitment:
    driver: bridge
