version: '3.9'

x-nest-defaults: &nest-defaults
  networks:
    - recruitment-overlay-network
  logging:
    driver: 'json-file'
    options:
      max-size: '10m'
      max-file: '3'

services:
  redis:
    image: redis:7-alpine
    container_name: recruitment-redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - '6380:6379'
    networks:
      - recruitment-network

  gateway-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/gateway-service/Dockerfile
    image: recruitment/gateway-service:latest
    container_name: gateway-service
    environment:
      PORT: 3000
      RABBITMQ_URL: ${RABBITMQ_URL}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '3000:3000'

  candidate-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/candidate-service/Dockerfile
    image: recruitment/candidate-service:latest
    container_name: candidate-service
    environment:
      PORT: 3001
      RABBITMQ_URL: ${RABBITMQ_URL}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '3001:3001'

  parsing-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/parsing-service/Dockerfile
    image: recruitment/parsing-service:latest
    container_name: parsing-service
    environment:
      PORT: 3002
      RABBITMQ_URL: ${RABBITMQ_URL}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3002/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '3002:3002'

  verification-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/verification-service/Dockerfile
    image: recruitment/verification-service:latest
    container_name: verification-service
    environment:
      PORT: 3003
      RABBITMQ_URL: ${RABBITMQ_URL}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3003/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '3003:3003'

  qualification-service:
    <<: *nest-defaults
    depends_on:
      redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: apps/qualification-service/Dockerfile
    image: recruitment/qualification-service:latest
    container_name: qualification-service
    environment:
      PORT: 3004
      RABBITMQ_URL: ${RABBITMQ_URL}
      QUALIFICATION_REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3004/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '3004:3004'

  notification-service:
    <<: *nest-defaults
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    image: recruitment/notification-service:latest
    container_name: notification-service
    environment:
      PORT: 3005
      RABBITMQ_URL: ${RABBITMQ_URL}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3005/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '3005:3005'

networks:
  recruitment-network:
    driver: bridge
