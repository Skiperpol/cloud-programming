name: Task 7 - Recruitment System Infra

on:
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform (RDS + databases + S3)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_db_master_password: ${{ secrets.DB_MASTER_PASSWORD }}
      TF_VAR_create_service_databases: "true"
      TF_VAR_create_subnet_and_param_groups: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Optional Terraform project name
        run: |
          if [ -n "${{ vars.TF_PROJECT_NAME }}" ]; then
            echo "TF_VAR_project_name=${{ vars.TF_PROJECT_NAME }}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Resolve state bucket name
        env:
          STATE_BUCKET: ${{ secrets.TF_TASK7_STATE_BUCKET }}
        run: |
          set -euo pipefail
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          if [ -z "${STATE_BUCKET:-}" ]; then
            GENERATED_BUCKET="tfstate-${GITHUB_REPOSITORY,,}-${AWS_DEFAULT_REGION}-${ACCOUNT_ID}"
            GENERATED_BUCKET="${GENERATED_BUCKET//\//-}"
            GENERATED_BUCKET="${GENERATED_BUCKET//_/-}"
            GENERATED_BUCKET="$(echo "${GENERATED_BUCKET}" | tr -cd 'a-z0-9.-' | cut -c1-63)"
            GENERATED_BUCKET="${GENERATED_BUCKET%-}"
            STATE_BUCKET="${GENERATED_BUCKET}"
          fi

          if ! aws s3api head-bucket --bucket "${STATE_BUCKET}" 2>/dev/null; then
            echo "::error::State bucket ${STATE_BUCKET} does not exist. Run workflow 'Task 7 - Recruitment System Bootstrap Backend' first."
            exit 1
          fi

          echo "STATE_BUCKET=${STATE_BUCKET}" >> "$GITHUB_ENV"

      - name: Terraform Init (Stage 1)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=task-7/recruitment-system/stage-1-infra/terraform.tfstate" \
            -backend-config="region=${AWS_DEFAULT_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Import existing RDS instance (if present)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        env:
          PROJECT_NAME: ${{ vars.TF_PROJECT_NAME }}
        run: |
          PROJECT="${PROJECT_NAME:-recruitment-system}"
          RDS_ID="${PROJECT}-postgres"
          if aws rds describe-db-instances --db-instance-identifier "$RDS_ID" >/dev/null 2>&1; then
            terraform import aws_db_instance.main "$RDS_ID" || true
          else
            echo "RDS instance not found: $RDS_ID"
          fi

      - name: Terraform Plan (Stage 1)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: terraform plan -input=false

      - name: Terraform Apply (Stage 1)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: terraform apply -auto-approve -input=false

      - name: Print connection hints (no secrets in log)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: |
          echo "RDS endpoint: $(terraform output -raw rds_endpoint)"
          echo "S3 bucket:    $(terraform output -raw aws_s3_bucket)"
          echo "Run locally:  terraform output -json database_urls (in terraform/stage-1-infra) -> .env"
