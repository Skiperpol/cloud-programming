name: Task 7 - Recruitment System Destroy

on:
  workflow_dispatch:

jobs:
  terraform-destroy:
    name: Terraform Destroy (Stage 1)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_db_master_password: ${{ secrets.DB_MASTER_PASSWORD }}
      TF_VAR_create_service_databases: "true"
      TF_VAR_create_subnet_and_param_groups: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Optional Terraform project name
        run: |
          if [ -n "${{ vars.TF_PROJECT_NAME }}" ]; then
            echo "TF_VAR_project_name=${{ vars.TF_PROJECT_NAME }}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Resolve state bucket name
        env:
          STATE_BUCKET: ${{ secrets.TF_TASK7_STATE_BUCKET }}
        run: |
          set -euo pipefail
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          if [ -z "${STATE_BUCKET:-}" ]; then
            GENERATED_BUCKET="tfstate-${GITHUB_REPOSITORY,,}-${AWS_DEFAULT_REGION}-${ACCOUNT_ID}"
            GENERATED_BUCKET="${GENERATED_BUCKET//\//-}"
            GENERATED_BUCKET="${GENERATED_BUCKET//_/-}"
            GENERATED_BUCKET="$(echo "${GENERATED_BUCKET}" | tr -cd 'a-z0-9.-' | cut -c1-63)"
            GENERATED_BUCKET="${GENERATED_BUCKET%-}"
            STATE_BUCKET="${GENERATED_BUCKET}"
          fi
          echo "STATE_BUCKET=${STATE_BUCKET}" >> "$GITHUB_ENV"

      - name: Terraform Init (Stage 1)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=task-7/recruitment-system/stage-1-infra/terraform.tfstate" \
            -backend-config="region=${AWS_DEFAULT_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Remove PostgreSQL databases from state (destroy order)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: |
          set -euo pipefail
          mapfile -t addrs < <(terraform state list 2>/dev/null | grep '^postgresql_database\.service_db' || true)
          if [ "${#addrs[@]}" -eq 0 ]; then
            echo "No postgresql_database resources in state."
          else
            for addr in "${addrs[@]}"; do
              terraform state rm "${addr}" || true
            done
          fi

      - name: Terraform Destroy (Stage 1)
        working-directory: task-7/recruitment-system/terraform/stage-1-infra
        run: terraform destroy -auto-approve -input=false
