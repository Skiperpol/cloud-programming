name: Terraform Destroy

on:
  workflow_dispatch:

jobs:
  terraform-destroy:
    name: Terraform Destroy (Stage 2 + Stage 1)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_db_master_password: ${{ secrets.DB_MASTER_PASSWORD }}
      TF_VAR_rabbitmq_url: ${{ secrets.RABBITMQ_URL }}
      TF_VAR_aws_s3_bucket: ${{ secrets.AWS_S3_BUCKET }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Stage 1)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        run: terraform init

      - name: Terraform Init (Stage 2)
        working-directory: task-6/recruitment-system/terraform/stage-2-app
        run: terraform init

      - name: Terraform Destroy (Stage 2)
        working-directory: task-6/recruitment-system/terraform/stage-2-app
        run: terraform destroy -auto-approve -input=false

      - name: Remove PostgreSQL database resources from state
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        run: |
          if ! terraform state pull >/dev/null 2>&1; then
            echo "No Terraform state found for Stage 1, skipping state cleanup."
            exit 0
          fi

          MATCHES="$(terraform state list 2>/dev/null || true)"
          if [ -n "$MATCHES" ]; then
            while IFS= read -r addr; do
              if [[ "$addr" == postgresql_database.service_db* ]]; then
                terraform state rm "$addr"
              fi
            done <<< "$MATCHES"
          else
            echo "No postgresql_database resources in state."
          fi

      - name: Import RDS instance to state (if exists)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        env:
          PROJECT_NAME: ${{ vars.TF_PROJECT_NAME }}
        run: |
          PROJECT="${PROJECT_NAME:-recruitment-system}"
          RDS_ID="${PROJECT}-postgres"

          if aws rds describe-db-instances --db-instance-identifier "$RDS_ID" >/dev/null 2>&1; then
            terraform import aws_db_instance.main "$RDS_ID" || true
          else
            echo "RDS instance not found: $RDS_ID"
          fi

      - name: Terraform Destroy (Stage 1)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        run: terraform destroy -auto-approve -input=false
