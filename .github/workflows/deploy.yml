name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - "task-6/recruitment-system/terraform/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/destroy.yml"
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform (Stage 1 + Stage 2)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_db_master_password: ${{ secrets.DB_MASTER_PASSWORD }}
      TF_VAR_rabbitmq_url: ${{ secrets.RABBITMQ_URL }}
      TF_VAR_aws_s3_bucket: ${{ secrets.AWS_S3_BUCKET }}
      TF_VAR_stage1_state_backend: local

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (Stage 1)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        run: terraform init

      - name: Import existing Stage 1 resources (if present)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        env:
          PROJECT_NAME: ${{ vars.TF_PROJECT_NAME }}
        run: |
          PROJECT="${PROJECT_NAME:-recruitment-system}"

          terraform import aws_db_subnet_group.main "${PROJECT}-db-subnets" || true
          terraform import aws_db_instance.main "${PROJECT}-postgres" || true
          terraform import aws_elasticache_parameter_group.redis7 "${PROJECT}-redis7-params" || true
          terraform import aws_elasticache_subnet_group.main "${PROJECT}-redis-subnets" || true
          terraform import aws_elasticache_replication_group.qualification_redis "${PROJECT}-redis" || true

      - name: Terraform Plan (Stage 1)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        run: terraform plan -input=false

      - name: Terraform Apply (Stage 1)
        working-directory: task-6/recruitment-system/terraform/stage-1-infra
        run: terraform apply -auto-approve -input=false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        env:
          ECR_REPOS: gateway-service candidate-service parsing-service verification-service qualification-service notification-service
        run: |
          for repo in $ECR_REPOS; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$repo" >/dev/null
          done

      - name: Build, tag, and push images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICES="gateway-service candidate-service parsing-service verification-service qualification-service notification-service"
          IMAGES_JSON="{"

          for SERVICE in $SERVICES; do
            SHORT_NAME="${SERVICE%-service}"
            IMAGE_URI="$ECR_REGISTRY/$SERVICE:$IMAGE_TAG"

            docker build -f "task-6/recruitment-system/apps/$SERVICE/Dockerfile.prod" -t "$IMAGE_URI" "task-6/recruitment-system"
            docker push "$IMAGE_URI"

            IMAGES_JSON="$IMAGES_JSON\"$SHORT_NAME\":\"$IMAGE_URI\","
          done

          IMAGES_JSON="${IMAGES_JSON%,}}"
          echo "TF_VAR_images=$IMAGES_JSON" >> "$GITHUB_ENV"

      - name: Terraform Init (Stage 2)
        working-directory: task-6/recruitment-system/terraform/stage-2-app
        run: terraform init

      - name: Terraform Plan (Stage 2)
        working-directory: task-6/recruitment-system/terraform/stage-2-app
        run: terraform plan -input=false

      - name: Terraform Apply (Stage 2)
        working-directory: task-6/recruitment-system/terraform/stage-2-app
        run: terraform apply -auto-approve -input=false
